name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, typecheck, and build
    runs-on: ubuntu-latest
    env:
      # The build only needs syntactically valid public values. Production
      # credentials remain GitHub secrets and are never exposed to CI logs.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
      # Must start with "sk_" to satisfy lib/env.server.ts's schema — this
      # placeholder never talks to real Paystack; the webhook route only
      # uses it to compute an HMAC that will legitimately reject all
      # requests, which is fine since CI never receives real webhooks.
      PAYSTACK_SECRET_KEY: sk_test_ci-placeholder-0000000000000000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Production build
        run: npm run build
        